  <title id="lc-hero-light-title">linkedin-chrome-copilot: macOS Chrome copilot plugin for Claude Code</title>
  <desc id="lc-hero-light-desc">Catppuccin Latte card. Left panel shows the wordmark lc in mauve over a monospaced tagline. Right panel shows an abstract briefcase outline crossed by conversation-thread lines anchoring a chat-bubble glyph in the upper area.</desc>
