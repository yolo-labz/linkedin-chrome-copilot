---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-shell:
    name: shellcheck + shfmt
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install shellcheck + shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -fsSL -o /tmp/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          sudo install -m 0755 /tmp/shfmt /usr/local/bin/shfmt

      - name: shellcheck
        run: |
          find . -type f \( -name '*.sh' -o -name '*.bash' \) \
            -not -path './.git/*' -not -path './node_modules/*' \
            -print0 | xargs -0 -r shellcheck --severity=warning

      - name: shfmt check
        run: |
          find . -type f \( -name '*.sh' -o -name '*.bash' \) \
            -not -path './.git/*' -not -path './node_modules/*' \
            -print0 | xargs -0 -r shfmt -i 2 -ci -bn -d

  pii-scan:
    name: pii-scan (hard gate)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run pii-scan
        run: bash tools/pii-scan.sh

  validate-fixtures:
    name: fixture + schema validation
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install jq + ajv-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          sudo npm install -g ajv-cli@5.0.0 ajv-formats@3.0.1

      - name: Validate fixtures (structural)
        run: bash tests/fixtures-validate.sh

      - name: Validate fixtures against JSON Schemas (draft-07)
        run: |
          set -e
          for pair in \
            "fixtures/aliases.example.json schemas/save-state.schema.json" \
            "fixtures/contacts.example.json schemas/contact.schema.json" \
            "fixtures/calendly-response.example.json schemas/slot.schema.json"; do
            f="${pair% *}"
            s="${pair#* }"
            if [ -f "$f" ] && [ -f "$s" ]; then
              echo "::group::ajv $f vs $s"
              ajv validate --spec=draft7 -c ajv-formats -s "$s" -d "$f" || true
              echo "::endgroup::"
            fi
          done

  bats:
    name: bats-core test suite
    runs-on: macos-14
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install bats-core + jq
        run: brew install bats-core jq

      - name: Clone sibling claude-mac-chrome (required by platform-gate.sh)
        run: |
          git clone --depth 1 \
            https://github.com/yolo-labz/claude-mac-chrome.git \
            "${GITHUB_WORKSPACE}/../claude-mac-chrome"

      - name: Run bats
        run: |
          if [ -d tests/bats ] && ls tests/bats/*.bats >/dev/null 2>&1; then
            bats tests/bats/
          else
            echo "No bats tests yet — skipping."
          fi

  actionlint:
    name: actionlint + zizmor
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: actionlint
        run: |
          curl -fsSL -o /tmp/actionlint.tgz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          tar -C /tmp -xzf /tmp/actionlint.tgz actionlint
          /tmp/actionlint -color

      - name: Install zizmor
        run: |
          python3 -m pip install --user zizmor==1.5.2
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: zizmor audit
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif || true
