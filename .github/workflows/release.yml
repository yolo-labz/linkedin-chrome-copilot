---
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  release:
    name: Release + attestations
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    timeout-minutes: 15
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Package plugin tarball
        run: |
          NAME="linkedin-chrome-copilot-${TAG_NAME}"
          mkdir -p dist
          tar --sort=name \
              --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              --exclude='./.git' --exclude='./dist' --exclude='./.stversions' \
              -czf "dist/${NAME}.tar.gz" .
          ( cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6988e8e11e2c # v0.17.4

      - name: Generate SBOMs (CycloneDX 1.7 + SPDX 2.3)
        run: |
          syft . \
            -o cyclonedx-json@1.7=dist/sbom.cdx.json \
            -o spdx-json=dist/sbom.spdx.json

      - name: Attest build provenance for tarball
        uses: actions/attest-build-provenance@7668571508540a607bdfd90a87a560489fe372eb # v2.1.0
        with:
          subject-path: dist/linkedin-chrome-copilot-*.tar.gz

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b # v2.1.0
        with:
          subject-path: dist/linkedin-chrome-copilot-*.tar.gz
          sbom-path: dist/sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/linkedin-chrome-copilot-*.tar.gz
            dist/linkedin-chrome-copilot-*.tar.gz.sha256
            dist/sbom.cdx.json
            dist/sbom.spdx.json
          generate_release_notes: true
