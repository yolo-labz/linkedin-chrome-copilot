---
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions: {}

jobs:
  release:
    name: Release + attestations
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    timeout-minutes: 15
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set SOURCE_DATE_EPOCH
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Package plugin tarball
        run: |
          NAME="linkedin-chrome-copilot-${TAG_NAME}"
          mkdir -p dist
          tar --sort=name \
              --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              --exclude='./.git' --exclude='./dist' --exclude='./.stversions' \
              -czf "dist/${NAME}.tar.gz" .
          ( cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOMs (CycloneDX 1.6 + SPDX 2.3)
        run: |
          syft . \
            -o cyclonedx-json@1.6=dist/sbom.cdx.json \
            -o spdx-json=dist/sbom.spdx.json

      - name: Attest build provenance for tarball
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/linkedin-chrome-copilot-*.tar.gz

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v2.1.0
        with:
          subject-path: dist/linkedin-chrome-copilot-*.tar.gz
          sbom-path: dist/sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # Semver pre-releases (v0.1.0-alpha.1, -beta, -rc) carry a hyphen;
          # stable tags (v1.2.3) do not. Keeps alphas off the "Latest" badge.
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/linkedin-chrome-copilot-*.tar.gz
            dist/linkedin-chrome-copilot-*.tar.gz.sha256
            dist/sbom.cdx.json
            dist/sbom.spdx.json
          generate_release_notes: true
