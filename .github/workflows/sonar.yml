name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout (full history for blame-based coverage)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Skip if SonarQube host not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
        run: |
          if [ -z "$HOST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL variable not set — skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
